name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read          # least privilege — CI only reads the repo (T-08-05)

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is the primary release target (keychain integration is macOS-gated);
        # Linux is the from-source / Docker / musl path. Test both.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all --check

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Validate the deploy image builds end-to-end (compiles the release binary
      # in-container). Native amd64 only — cross-building the arm64 deploy target
      # via QEMU would multiply a Rust + aws-lc compile by ~10x for no extra
      # signal. The Dockerfile is arch-agnostic, so amd64 success implies arm64.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
