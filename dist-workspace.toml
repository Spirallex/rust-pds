[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Homebrew tap to publish the formula to on each release. The repo must be named
# `homebrew-tap`; users then run `brew install spirallex/tap/stelyph`.
tap = "spirallex/homebrew-tap"
publish-jobs = ["homebrew"]
# Sigstore build-provenance attestations (repo is public — attestation API available).
# Verify with: gh attestation verify <artifact> --repo Spirallex/rust-pds
github-attestations = true
# Target platforms to build apps for (Rust target-triple syntax).
# macOS (Apple Silicon) only for now — Linux is build-from-source. To distribute
# Linux binaries again, re-add the musl targets plus their arm64 runner and apt
# deps (see git history for the removed [dist.github-custom-runners] /
# [dist.dependencies.apt] blocks).
targets = [
  "aarch64-apple-darwin",
]

# aws-lc-sys (TLS stack) needs cmake to build. macOS runners usually ship it, but
# pin it explicitly so a runner-image change can't break the darwin release build.
[dist.dependencies.homebrew]
cmake = { version = "*", targets = ["aarch64-apple-darwin"] }
