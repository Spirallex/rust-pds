[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Sigstore build-provenance attestations — verify with:
#   gh attestation verify <artifact> --repo <owner>/<repo>
github-attestations = true
# Target platforms to build apps for (Rust target-triple syntax)
# Linux-only static musl targets — darwin out of scope (PROJECT.md drop-first)
targets = [
  "x86_64-unknown-linux-musl",
  "aarch64-unknown-linux-musl",
]

# Native arm64 runner — avoids ring v0.17 aarch64-musl cross-compile failure (Pitfall 1)
# ring's build.rs requires aarch64-linux-musl-ar; not present when cross-compiling from x86_64
[dist.github-custom-runners]
aarch64-unknown-linux-musl = "ubuntu-24.04-arm"

# musl-tools + musl-dev installed per-target on each runner (native arch tools)
[dist.dependencies.apt]
musl-tools = { version = "*", targets = ["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl"] }
musl-dev = { version = "*", targets = ["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl"] }
