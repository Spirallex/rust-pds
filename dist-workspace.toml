[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Homebrew tap to publish the formula to on each release. The repo must be named
# `homebrew-tap`; users then run `brew install spirallex/tap/stelyph`.
tap = "spirallex/homebrew-tap"
publish-jobs = ["homebrew"]
# Sigstore build-provenance attestations. Disabled while the repo is PRIVATE on a
# free org plan — GitHub's attestation API rejects it ("upgrade the billing plan, or
# make this repository public"). Re-enable (set true, re-run `dist generate`) when the
# repo goes public; verify with: gh attestation verify <artifact> --repo <owner>/<repo>
github-attestations = false
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
  "x86_64-unknown-linux-musl",
  "aarch64-unknown-linux-musl",
  "aarch64-apple-darwin",
]

# Native arm64 runner — avoids ring v0.17 aarch64-musl cross-compile failure (Pitfall 1)
# ring's build.rs requires aarch64-linux-musl-ar; not present when cross-compiling from x86_64
[dist.github-custom-runners]
aarch64-unknown-linux-musl = "ubuntu-24.04-arm"

# musl-tools + musl-dev installed per-target on each runner (native arch tools)
[dist.dependencies.apt]
musl-tools = { version = "*", targets = ["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl"] }
musl-dev = { version = "*", targets = ["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl"] }

# aws-lc-sys (TLS stack) needs cmake to build. macOS runners usually ship it, but
# pin it explicitly so a runner-image change can't break the darwin release build.
[dist.dependencies.homebrew]
cmake = { version = "*", targets = ["aarch64-apple-darwin"] }
